fragment SystemSnippet on SystemClass {
  unitExtras
  laborTypes
  fluidTypes
  companyVehicleTypeDefaults {
    ...DefaultRateSnippet
  }
  materialShipmentVehicleTypeDefaults {
    ...DefaultRateSnippet
  }
  internalExpenseOverheadRate {
    ...RateSnippet
  }
  specFiles {
    _id
    documentType
    summaryStatus
    summaryError
    pageCount
    processingStartedAt
    summaryProgress {
      phase
      current
      total
      updatedAt
    }
    summary {
      overview
      documentType
      keyTopics
      chunks {
        startPage
        endPage
        overview
        keyTopics
      }
    }
    file {
      _id
      mimetype
      description
    }
  }
}
