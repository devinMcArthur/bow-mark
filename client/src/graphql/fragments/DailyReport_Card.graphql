fragment DailyReportCardSnippet on DailyReportClass {
  _id
  date
  jobCostApproved
  payrollComplete
  jobsite {
    _id
    name
    jobcode
    location {
      latitude
      longitude
    }
  }
  crew {
    _id
    name
  }
  employeeWorkCount
  vehicleWorkCount
  materialShipmentCount
  productionCount
}
