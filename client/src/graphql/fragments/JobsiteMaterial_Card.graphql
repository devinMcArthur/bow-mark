fragment JobsiteMaterialCardSnippet on JobsiteMaterialClass {
  _id
  material {
    ...MaterialCardSnippet
  }
  supplier {
    ...CompanyCardSnippet
  }
  quantity
  completedQuantity {
    year
    quantity
  }
  unit
  costType
  costModel
  delivered
  rates {
    ...JobsiteMaterialRateSnippet
  }
  deliveredRates {
    ...JobsiteMaterialDeliveredRateSnippet
  }
  scenarios {
    _id
    label
    delivered
    rates {
      ...JobsiteMaterialRateSnippet
    }
  }
  canRemove
}
