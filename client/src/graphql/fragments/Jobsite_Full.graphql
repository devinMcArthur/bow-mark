fragment JobsiteFullSnippet on JobsiteClass {
  _id
  name
  jobcode
  description
  location_url
  active
  archivedAt
  crews {
    ...CrewCardSnippet
  }
  monthReports {
    ...JobsiteMonthReportCardSnippet
  }
  yearReports {
    ...JobsiteYearReportCardSnippet
  }
  truckingRates {
    ...TruckingTypeRateSnippet
  }
  materials {
    _id
  }
  contract {
    ...JobsiteContractSnippet
  }
  fileObjects {
    ...JobsiteFileObjectPreloadSnippet
  }
  enrichedFiles {
    _id
    minRole
    enrichedFile {
      _id
      documentType
      summaryStatus
      summaryError
      pageCount
      processingStartedAt
      summaryProgress {
        phase
        current
        total
        updatedAt
      }
      summary {
        overview
        documentType
        keyTopics
      }
      file {
        _id
        mimetype
        description
      }
    }
  }
  location {
    latitude
    longitude
  }
}
