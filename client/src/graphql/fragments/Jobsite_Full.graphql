fragment JobsiteFullSnippet on JobsiteClass {
  _id
  name
  jobcode
  description
  active
  archivedAt
  crews {
    ...CrewCardSnippet
  }
  monthReports {
    ...JobsiteMonthReportCardSnippet
  }
  yearReports {
    ...JobsiteYearReportCardSnippet
  }
  truckingRates {
    ...TruckingTypeRateSnippet
  }
  materials {
    _id
  }
  contract {
    ...JobsiteContractSnippet
  }
  fileObjects {
    ...JobsiteFileObjectPreloadSnippet
  }
  documents {
    _id
    name
    documentId
    mimetype
    minRole
    enrichment {
      status
      summary {
        overview
        documentType
        keyTopics
      }
    }
  }
  location {
    latitude
    longitude
  }
}
