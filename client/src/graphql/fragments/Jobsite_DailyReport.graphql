fragment JobsiteForDailyReportSnippet on JobsiteClass {
  _id
  name
  materials {
    ...JobsiteMaterialForDailyReportSnippet
  }
  truckingRates {
    ...TruckingTypeRateSnippet
  }
  fileObjects {
    ...JobsiteFileObjectPreloadSnippet
  }
  enrichedFiles {
    _id
    minRole
    enrichedFile {
      _id
      documentType
      summaryStatus
      summaryError
      pageCount
      summary {
        overview
        documentType
        keyTopics
      }
      file {
        _id
        mimetype
        description
      }
    }
  }
}
