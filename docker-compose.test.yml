version: "3.8"

# Isolated test database stack — does not conflict with the Tilt/Minikube dev environment.
# MongoDB on port 27018 (dev uses 27017 via minikube).
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   npm run test:e2e --prefix client
#   docker compose -f docker-compose.test.yml down

services:
  mongodb-test:
    image: mongo:6
    ports:
      - "27018:27017"

  meilisearch-test:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7701:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=e2e-test-meili-key
