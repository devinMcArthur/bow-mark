apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-analytics-deployment
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  replicas: 1
  selector:
    matchLabels:
      component: mcp-analytics
  template:
    metadata:
      labels:
        component: mcp-analytics
    spec:
      nodeSelector:
        doks.digitalocean.com/node-pool: dedicated-cpu-optimized
      containers:
        - name: mcp-analytics
          image: itsdevin/bow-mark-server:$COMMIT_SHA1
          command: ["node", "dist/mcp-server.js"]
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          env:
            - name: NODE_ENV
              value: production
            - name: MCP_PORT
              value: "8081"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: port
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: dbPaving
