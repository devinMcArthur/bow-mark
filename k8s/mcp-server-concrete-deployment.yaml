apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-analytics-concrete-deployment
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  replicas: 1
  selector:
    matchLabels:
      component: mcp-analytics-concrete
  template:
    metadata:
      labels:
        component: mcp-analytics-concrete
    spec:
      nodeSelector:
        doks.digitalocean.com/node-pool: dedicated-cpu-optimized
      containers:
        - name: mcp-analytics-concrete
          image: itsdevin/bow-mark-server:$COMMIT_SHA1
          command: ["node", "dist/mcp-server.js"]
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          env:
            - name: NODE_ENV
              value: production
            - name: MCP_PORT
              value: "8081"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: concrete
                  key: mongoURI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: general
                  key: jwtSecret
            - name: SPACES_NAME
              valueFrom:
                secretKeyRef:
                  name: spaces
                  key: name
            - name: SPACES_REGION
              valueFrom:
                secretKeyRef:
                  name: spaces
                  key: region
            - name: SPACES_KEY
              valueFrom:
                secretKeyRef:
                  name: spaces
                  key: key
            - name: SPACES_SECRET
              valueFrom:
                secretKeyRef:
                  name: spaces
                  key: secret
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: port
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: dbConcrete
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: host
            - name: RABBITMQ_PORT
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: port
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: password
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: vhost
